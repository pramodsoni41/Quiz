<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Class Quiz</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Optional favicon fix -->
  <link rel="icon" href="data:,">
</head>

<body>

<!-- 🔵 Loading -->
<div id="loadingOverlay" class="hidden">
  <div class="loaderBox">
    <div class="spinner"></div>
    <div class="loadingText">Starting Quiz...</div>
  </div>
</div>

<div id="toast" class="hidden"></div>

<div class="container">

  <!-- 🔹 SETUP -->
  <section id="setup" class="card">
    <h1 id="quizTitle">Loading quiz...</h1>
    <p class="muted" id="quizIntro">Fetching quiz from server...</p>
    <p class="muted" id="quizDue"></p>

    <div class="notice" id="quizInstructions">
      Enter your details and login password to begin.
    </div>

    <div class="notice" id="markingSchemeBox">
      Marking scheme loading...
    </div>

    <div class="grid2">
      <div>
        <label>Name</label>
        <input id="studentName" disabled />
      </div>
      <div>
        <label>ID No</label>
        <input id="regNo" disabled />
      </div>
    </div>

    <div class="grid2" style="margin-top:12px;">
      <div>
        <label>Phone No</label>
        <input id="phoneNo" disabled />
      </div>
      <div>
        <label>Password</label>
        <input id="studentPassword" type="text" disabled />
      </div>
    </div>

    <div class="row">
      <button id="startBtn" disabled>Loading Quiz...</button>
    </div>
  </section>

  <!-- 🔹 QUIZ -->
  <section id="quiz" class="card hidden">
    <div class="topbar">
      <div class="pill" id="progressPill">Question</div>
      <div class="pill timer" id="timerPillTop">0 s</div>
      <div class="pill" id="studentPill">Student</div>
    </div>

    <div class="qtext nocopy" id="questionText"></div>
    <div class="answers" id="answersBox"></div>

    <div class="row">
      <button id="submitAnswerBtn" class="submit-btn">Submit</button>
      <button id="skipBtn" class="skip-btn">Skip</button>
      <button id="finishBtn" class="finish-btn">Finish</button>
      <div class="pill timer" id="timerPillBottom">0 s</div>
    </div>

    <div class="notice" id="quizNotice">Select one answer.</div>
  </section>

  <!-- 🔹 RESULT -->
  <section id="result" class="card hidden">
    <h2>Quiz Result</h2>

    <div class="score" id="scoreText">0</div>
    <p id="resultMeta"></p>

    <div id="resultTableWrap" class="hidden">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Question</th>
            <th>Your Answer</th>
            <th>Correct</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="row">
      <button id="retryBtn" class="good hidden">Retry</button>
      <button id="restartBtn" class="secondary">Restart</button>
    </div>
  </section>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
