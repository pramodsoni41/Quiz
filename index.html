<script>
document.addEventListener("DOMContentLoaded", () => {

const $ = (id) => document.getElementById(id);
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyAcragw-0-dNOyfGqMJaxCGy2Q7OubLpMz_kEmWIZVxnrGOAIvUP08iux7AyMthI/exec";

const state = {
  sessionToken: null,
  student: null,
  active: [],
  current: 0,
  timer: null,
  quizStarted: false,
  timeLeft: 0,
  responses: [],
  selectedIndex: null,
  penalty: 0,
  isTransitioning: false,
  antiCheat: { hiddenCount: 0, blurCount: 0, fsExit: 0 }
};

//////////////////////////////////////////////////
// SAFE WARNING UI
//////////////////////////////////////////////////

function showWarning(msg) {
  const box = $('quizNotice');
  if (!box) return;

  box.textContent = msg;
  box.style.background = "#fee2e2";
  box.style.color = "#dc2626";

  setTimeout(() => {
    box.textContent = "Select an answer to proceed.";
    box.style.background = "";
    box.style.color = "";
  }, 2000);
}

//////////////////////////////////////////////////
// SAFE SKIP
//////////////////////////////////////////////////

function safeSkipQuestion() {
  if (state.isTransitioning) return;

  state.isTransitioning = true;
  clearInterval(state.timer);

  setTimeout(() => {
    recordAndNext(-1, true);
    state.isTransitioning = false;
  }, 300);
}

//////////////////////////////////////////////////
// PROCTORING
//////////////////////////////////////////////////

document.addEventListener("visibilitychange", () => {

  if (!state.quizStarted) return;

  if (document.hidden) {

    state.antiCheat.hiddenCount++;
    const c = state.antiCheat.hiddenCount;

    if (c === 1) {
      showWarning("⚠️ Warning 1/3");
    } else if (c === 2) {
      showWarning("❌ Warning 2/3 (-1 mark)");
      state.penalty++;
    } else {
      showWarning("🚫 Question skipped");
      safeSkipQuestion();
    }
  }
});

window.addEventListener("blur", () => {
  if (state.quizStarted) state.antiCheat.blurCount++;
});

document.addEventListener("fullscreenchange", () => {
  if (state.quizStarted && !document.fullscreenElement) {
    state.antiCheat.fsExit++;
    showWarning("Fullscreen exited!");
  }
});

// Disable copy/paste
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

//////////////////////////////////////////////////
// API
//////////////////////////////////////////////////

async function postJSON(payload) {
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch (e) {
    console.error("API error", e);
    return {};
  }
}

//////////////////////////////////////////////////
// START QUIZ
//////////////////////////////////////////////////

const startBtn = $('startBtn');
if (startBtn) {
startBtn.onclick = async () => {

  const reg = $('regNo').value.trim();
  const pass = $('studentPassword').value.trim();

  if (!reg || !pass) {
    alert("Fill required fields");
    return;
  }

  await document.documentElement.requestFullscreen();

  const login = await postJSON({
    action: 'validateLogin',
    regNo: reg,
    password: pass
  });

  if (login.status !== 'ok') {
    alert("Login failed");
    return;
  }

  state.sessionToken = login.sessionToken;
  state.student = { name: login.name, regNo: reg };

  // ✅ FETCH QUESTIONS
  const qData = await postJSON({
    action: 'getQuestions',
    sessionToken: state.sessionToken
  });

  if (!qData.questions || qData.questions.length === 0) {
    alert("No questions received from server");
    return;
  }

  state.active = qData.questions.map(q => ({
    ...q,
    answers: [q.options.A, q.options.B, q.options.C, q.options.D]
  }));

  state.quizStarted = true;

  showSection('quiz');
  renderQuestion();
};
}

//////////////////////////////////////////////////
// RENDER QUESTION
//////////////////////////////////////////////////

function renderQuestion() {

  if (!state.active || state.active.length === 0) {
    $('quizNotice').textContent = "No questions loaded!";
    return;
  }

  const q = state.active[state.current];
  state.selectedIndex = null;

  $('questionText').textContent = q.question;
  $('answersBox').innerHTML = '';
  $('submitAnswerBtn').disabled = true;

  q.answers.forEach((ans, i) => {
    const b = document.createElement('button');
    b.className = 'answer';
    b.textContent = ans;

    b.onclick = () => {
      state.selectedIndex = i;
      document.querySelectorAll('.answer').forEach(el => el.classList.remove('selected'));
      b.classList.add('selected');
      $('submitAnswerBtn').disabled = false;
    };

    $('answersBox').appendChild(b);
  });

  state.timeLeft = q.time;
  startTimer();
}

//////////////////////////////////////////////////
// TIMER
//////////////////////////////////////////////////

function startTimer() {
  clearInterval(state.timer);

  state.timer = setInterval(() => {
    state.timeLeft--;
    $('timerPillTop').textContent = state.timeLeft + " s";

    if (state.timeLeft <= 0) {
      recordAndNext(-1, true);
    }
  }, 1000);
}

//////////////////////////////////////////////////
// RECORD
//////////////////////////////////////////////////

function recordAndNext(idx, timeout) {

  clearInterval(state.timer);

  state.responses.push({
    questionId: "Q" + (state.current + 1),
    selectedIndex: idx,
    timedOut: timeout
  });

  state.current++;

  if (state.current < state.active.length) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

//////////////////////////////////////////////////
// BUTTONS
//////////////////////////////////////////////////

$('submitAnswerBtn').onclick = () => {
  recordAndNext(state.selectedIndex, false);
};

$('skipBtn').onclick = () => recordAndNext(-1, false);

//////////////////////////////////////////////////
// FINISH
//////////////////////////////////////////////////

async function finishQuiz() {

  clearInterval(state.timer);
  showSection('result');

  const res = await postJSON({
    action: 'submitQuiz',
    sessionToken: state.sessionToken,
    student: state.student,
    responses: state.responses,
    antiCheat: state.antiCheat,
    penalty: state.penalty
  });

  if (res.status === 'submitted') {
    $('scoreText').textContent = `${res.result.score} / ${res.result.maxMarks}`;
    $('resultMeta').textContent =
      `Correct: ${res.result.correctCount}, Incorrect: ${res.result.incorrectCount}`;
  } else {
    $('scoreText').textContent = "Submission Error";
  }
}

//////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////

function showSection(id) {
  ['setup','quiz','result'].forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
}

});
</script>
