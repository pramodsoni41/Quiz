<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
.hidden { display:none; }
button { padding:10px; margin:5px; }
.answer { display:block; width:100%; text-align:left; }
#quizNotice { margin-top:10px; }
</style>

</head>

<body>

<!-- SETUP -->
<div id="setup">
  <h2>Login</h2>
  <input id="regNo" placeholder="Roll No"><br><br>
  <input id="studentPassword" placeholder="Password" type="password"><br><br>
  <button id="startBtn">Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <h3 id="questionText"></h3>
  <div id="answersBox"></div>
  <div id="timerPillTop"></div>
  <div id="quizNotice"></div>
  <button id="submitAnswerBtn">Submit</button>
  <button id="skipBtn">Skip</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <h2 id="scoreText"></h2>
  <p id="resultMeta"></p>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const $ = (id) => document.getElementById(id);

// 🔗 PUT YOUR SCRIPT URL
const URL = "https://script.google.com/macros/s/AKfycbwyAcragw-0-dNOyfGqMJaxCGy2Q7OubLpMz_kEmWIZVxnrGOAIvUP08iux7AyMthI/exec";

// STATE
const state = {
  sessionToken:null,
  questions:[],
  current:0,
  selectedIndex:null,
  responses:[],
  timer:null,
  timeLeft:0,
  quizStarted:false,
  penalty:0,
  antiCheat:{hiddenCount:0}
};

//////////////////////////////////////////////////
// SAFE WARNING
//////////////////////////////////////////////////

function showWarning(msg){
  const box = $('quizNotice');
  if(!box) return;
  box.textContent = msg;
}

//////////////////////////////////////////////////
// PROCTORING (SAFE)
//////////////////////////////////////////////////

document.addEventListener("visibilitychange", ()=>{
  if(!state.quizStarted) return;

  if(document.hidden){
    state.antiCheat.hiddenCount++;

    if(state.antiCheat.hiddenCount===1){
      showWarning("⚠️ Warning 1");
    }
    else if(state.antiCheat.hiddenCount===2){
      showWarning("❌ -1 mark");
      state.penalty++;
    }
    else{
      showWarning("🚫 Skipped");
      nextQuestion(-1,true);
    }
  }
});

//////////////////////////////////////////////////
// API
//////////////////////////////////////////////////

async function post(data){
  try{
    const res = await fetch(URL,{
      method:"POST",
      body:JSON.stringify(data)
    });
    return await res.json();
  }catch(e){
    console.error(e);
    alert("Server error");
    return {};
  }
}

//////////////////////////////////////////////////
// START
//////////////////////////////////////////////////

const startBtn = $('startBtn');

if(startBtn){
startBtn.onclick = async ()=>{

  const reg = $('regNo').value.trim();
  const pass = $('studentPassword').value.trim();

  if(!reg || !pass){
    alert("Enter details");
    return;
  }

  const login = await post({
    action:"validateLogin",
    regNo:reg,
    password:pass
  });

  if(login.status!=="ok"){
    alert("Login failed");
    return;
  }

  state.sessionToken = login.sessionToken;

  const qData = await post({
    action:"getQuestions",
    sessionToken:state.sessionToken
  });

  if(!qData.questions || qData.questions.length===0){
    alert("No questions");
    return;
  }

  state.questions = qData.questions;
  state.quizStarted = true;

  show("quiz");
  render();

};
}

//////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////

function render(){

  const q = state.questions[state.current];
  state.selectedIndex = null;

  $('questionText').textContent = q.question;
  $('answersBox').innerHTML = "";

  ["A","B","C","D"].forEach((k,i)=>{
    const btn = document.createElement("button");
    btn.className="answer";
    btn.textContent = q.options[k];

    btn.onclick = ()=>{
      state.selectedIndex = i;
    };

    $('answersBox').appendChild(btn);
  });

  startTimer(q.time || 15);
}

//////////////////////////////////////////////////
// TIMER
//////////////////////////////////////////////////

function startTimer(t){
  clearInterval(state.timer);
  state.timeLeft = t;

  state.timer = setInterval(()=>{
    state.timeLeft--;
    $('timerPillTop').textContent = state.timeLeft+" s";

    if(state.timeLeft<=0){
      nextQuestion(-1,true);
    }
  },1000);
}

//////////////////////////////////////////////////
// NEXT
//////////////////////////////////////////////////

function nextQuestion(idx,timeout){

  clearInterval(state.timer);

  state.responses.push({
    q:state.current,
    ans:idx,
    t:timeout
  });

  state.current++;

  if(state.current < state.questions.length){
    render();
  }else{
    finish();
  }
}

//////////////////////////////////////////////////
// BUTTONS (SAFE)
//////////////////////////////////////////////////

const submitBtn = $('submitAnswerBtn');
if(submitBtn){
  submitBtn.onclick = ()=>{
    nextQuestion(state.selectedIndex,false);
  };
}

const skipBtn = $('skipBtn');
if(skipBtn){
  skipBtn.onclick = ()=> nextQuestion(-1,false);
}

//////////////////////////////////////////////////
// FINISH
//////////////////////////////////////////////////

async function finish(){

  show("result");

  const res = await post({
    action:"submitQuiz",
    sessionToken:state.sessionToken,
    responses:state.responses,
    penalty:state.penalty,
    antiCheat:state.antiCheat
  });

  if(res.status==="submitted"){
    $('scoreText').textContent = res.result.score;
    $('resultMeta').textContent =
      "Correct: "+res.result.correctCount;
  }else{
    $('scoreText').textContent = "Error";
  }
}

//////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////

function show(id){
  ['setup','quiz','result'].forEach(s=>{
    const el = $(s);
    if(el) el.classList.add("hidden");
  });
  $(id).classList.remove("hidden");
}

});
</script>

</body>
</html>
