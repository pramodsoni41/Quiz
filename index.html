<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Quiz</title>
  <style>
    :root {
      --bg1:#0b1020;
      --bg2:#111b36;
      --card:#15213f;
      --accent:#60a5fa;
      --accent2:#22c55e;
      --text:#eef2ff;
      --muted:#cbd5e1;
      --danger:#ef4444;
      --warn:#f59e0b;
      --border:rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: rgba(21,33,63,0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    h1,h2,h3,p { margin-top:0; }
    .muted { color: var(--muted); }
    .hidden { display:none !important; }
    .grid2 {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    label {
      display:block;
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:6px;
    }
    input, select {
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0c1530;
      color:var(--text);
      font-size:1rem;
    }
    button {
      padding:12px 18px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-size:1rem;
      font-weight:700;
      background:var(--accent);
      color:#07111f;
    }
    button.secondary {
      background:#233252;
      color:var(--text);
      border:1px solid var(--border);
    }
    button.good { background: var(--accent2); color:#06230f; }
    button:disabled { opacity:0.55; cursor:not-allowed; }
