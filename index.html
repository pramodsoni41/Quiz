<!DOCTYPE html>
<html>
<head>
<title>Class Quiz</title>
</head>

<body>

<h2 id="question"></h2>
<div id="options"></div>
<h3 id="timer"></h3>

<script>

let questions = [
 {q:"Reynolds number represents?", options:["Inertia/viscous","Pressure","Gravity","None"], ans:0,time:20},
 {q:"Head loss equation?", options:["Darcy","Newton","Hooke","None"], ans:0,time:15}
];

questions = questions.sort(()=>Math.random()-0.5);

let index=0;

function showQuestion(){

let q=questions[index];

document.getElementById("question").innerText=q.q;

let html="";

q.options.forEach((o,i)=>{
html+=`<button onclick="answer(${i})">${o}</button><br>`
});

document.getElementById("options").innerHTML=html;

startTimer(q.time);

}

function startTimer(t){

let timer=document.getElementById("timer");

let interval=setInterval(()=>{

timer.innerText="Time: "+t;

t--;

if(t<0){
clearInterval(interval);
next();
}

},1000);

}

function answer(i){

let q=questions[index];

alert(i==q.ans?"Correct":"Wrong");

next();

}

function next(){

index++;

if(index<questions.length) showQuestion();
else alert("Quiz finished");

}

showQuestion();

</script>

</body>
</html>
