<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Class Quiz</title>

<style>
.hidden { display:none !important; }
button { padding:10px; margin:5px; }
.answer { display:block; width:100%; text-align:left; }
</style>
</head>

<body>

<!-- SETUP -->
<div id="setup">
  <h2 id="quizTitle">Loading...</h2>
  <input id="regNo" placeholder="ID"><br><br>
  <input id="studentPassword" type="password" placeholder="Password"><br><br>
  <button id="startBtn" disabled>Checking...</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <h3 id="questionText"></h3>
  <div id="answersBox"></div>
  <div id="timerPillTop"></div>
  <div id="quizNotice"></div>
  <button id="submitAnswerBtn">Submit</button>
  <button id="skipBtn">Skip</button>
  <button id="finishBtn">Finish</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <h2 id="scoreText"></h2>
  <p id="resultMeta"></p>
  <button id="restartBtn">Restart</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const $ = (id) => document.getElementById(id);
const URL = "https://script.google.com/macros/s/AKfycbwqudZ7AegDQV9Js2Wa3HXZRi4AAisjXnO_PYvuveaonbp84evQTItENObpOvYIciM/exec";

let state = {
  sessionToken:null,
  active:[],
  current:0,
  selectedIndex:null,
  responses:[],
  timer:null,
  timeLeft:0,
  isSubmitting:false
};

//////////////////////////////////////////////////
// SAFE FETCH (fix submission issue)
//////////////////////////////////////////////////

async function postJSON(payload) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    return await res.json();
  } catch (e) {
    console.error("Fetch failed:", e);
    throw e;
  } finally {
    clearTimeout(timeout);
  }
}

//////////////////////////////////////////////////
// LOAD META
//////////////////////////////////////////////////

async function loadQuizMeta() {
  try {
    const data = await postJSON({ action: 'getQuizMeta' });
    $('quizTitle').textContent = data.meta.quizName || "Quiz";
    $('startBtn').disabled = false;
    $('startBtn').textContent = "Start Quiz";
  } catch (e) {
    $('quizTitle').textContent = "Connection Error";
  }
}

//////////////////////////////////////////////////
// START QUIZ
//////////////////////////////////////////////////

function bindButtons(){

  const startBtn = $('startBtn');
  if(startBtn){
    startBtn.onclick = async () => {

      const reg = $('regNo').value.trim();
      const pass = $('studentPassword').value.trim();

      if(!reg || !pass){
        alert("Enter details");
        return;
      }

      startBtn.disabled = true;
      startBtn.textContent = "Logging in...";

      try{
        const login = await postJSON({
          action:'validateLogin',
          regNo:reg,
          password:pass
        });

        if(login.status !== 'ok'){
          alert("Login failed");
          startBtn.disabled=false;
          startBtn.textContent="Start Quiz";
          return;
        }

        state.sessionToken = login.sessionToken;

        const qData = await postJSON({
          action:'getQuestions',
          sessionToken:state.sessionToken
        });

        if(!qData.questions || qData.questions.length === 0){
          alert("No questions");
          return;
        }

        state.active = qData.questions.map(q => ({
          ...q,
          answers:[q.options.A,q.options.B,q.options.C,q.options.D]
        }));

        show('quiz');
        renderQuestion();

      }catch(e){
        alert("Network error");
        startBtn.disabled=false;
        startBtn.textContent="Start Quiz";
      }
    };
  }

  const submitBtn = $('submitAnswerBtn');
  if(submitBtn){
    submitBtn.onclick = () => {
      recordAndNext(state.selectedIndex,false);
    };
  }

  const skipBtn = $('skipBtn');
  if(skipBtn){
    skipBtn.onclick = () => recordAndNext(-1,false);
  }

  const finishBtn = $('finishBtn');
  if(finishBtn){
    finishBtn.onclick = () => {
      if(confirm("Finish?")) finishQuiz();
    };
  }

  const restartBtn = $('restartBtn');
  if(restartBtn){
    restartBtn.onclick = () => location.reload();
  }
}

//////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////

function renderQuestion(){

  const q = state.active[state.current];
  state.selectedIndex = null;

  $('questionText').textContent = q.question;
  $('answersBox').innerHTML = '';

  q.answers.forEach((ans,i)=>{
    const b = document.createElement("button");
    b.className = "answer";
    b.textContent = ans;

    b.onclick = ()=>{
      state.selectedIndex = i;
    };

    $('answersBox').appendChild(b);
  });

  startTimer(q.time || 15);
}

//////////////////////////////////////////////////
// TIMER
//////////////////////////////////////////////////

function startTimer(t){
  clearInterval(state.timer);

  state.timeLeft = t;

  state.timer = setInterval(()=>{
    state.timeLeft--;
    $('timerPillTop').textContent = state.timeLeft+" s";

    if(state.timeLeft <= 0){
      recordAndNext(-1,true);
    }
  },1000);
}

//////////////////////////////////////////////////
// RECORD
//////////////////////////////////////////////////

function recordAndNext(idx,timeout){

  clearInterval(state.timer);

  state.responses.push({
    questionId:"Q"+(state.current+1),
    selectedIndex:idx,
    timedOut:timeout
  });

  state.current++;

  if(state.current < state.active.length){
    renderQuestion();
  }else{
    finishQuiz();
  }
}

//////////////////////////////////////////////////
// FINISH
//////////////////////////////////////////////////

async function finishQuiz(){

  if(state.isSubmitting) return;
  state.isSubmitting = true;

  show('result');
  $('scoreText').textContent = "Submitting...";

  try{
    const res = await postJSON({
      action:'submitQuiz',
      sessionToken:state.sessionToken,
      responses:state.responses
    });

    if(res.status === 'submitted'){
      $('scoreText').textContent = res.result.score;
      $('resultMeta').textContent = "Correct: "+res.result.correctCount;
    }else{
      $('scoreText').textContent = "Submission Failed";
    }
  }catch(e){
    $('scoreText').textContent = "Network Error";
  }
}

//////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////

function show(id){
  ['setup','quiz','result'].forEach(s=>{
    const el = $(s);
    if(el) el.classList.add("hidden");
  });
  $(id).classList.remove("hidden");
}

//////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////

bindButtons();
loadQuizMeta();

});
</script>

</body>
</html>
