<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Quiz</title>
  <style>
    :root {
      --bg1:#0b1020;
      --bg2:#111b36;
      --card:#15213f;
      --accent:#60a5fa;
      --accent2:#22c55e;
      --text:#eef2ff;
      --muted:#cbd5e1;
      --danger:#ef4444;
      --warn:#f59e0b;
      --border:rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: rgba(21,33,63,0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    h1,h2,h3,p { margin-top:0; }
    .muted { color: var(--muted); }
    .hidden { display:none !important; }
    .grid2 {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    label {
      display:block;
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:6px;
    }
    input, select {
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0c1530;
      color:var(--text);
      font-size:1rem;
    }
    button {
      padding:12px 18px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-size:1rem;
      font-weight:700;
      background:var(--accent);
      color:#07111f;
    }
    button.secondary {
      background:#233252;
      color:var(--text);
      border:1px solid var(--border);
    }
    button.good { background: var(--accent2); color:#06230f; }
    button:disabled { opacity:0.55; cursor:not-allowed; }
    .topbar {
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .pill {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:#0c1530;
      border:1px solid var(--border);
      font-weight:700;
    }
    .timer { font-size:1.3rem; }
    .timer.low { color: var(--warn); }
    .timer.zero { color: var(--danger); }
    .qtext {
      font-size:1.55rem;
      line-height:1.45;
      margin:18px 0 20px;
      font-weight:800;
    }
    .answers {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .answer {
      text-align:left;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:#0c1530;
      color:var(--text);
      min-height:84px;
    }
    .answer:hover { border-color: rgba(96,165,250,0.7); }
    .answer.correct { outline:3px solid rgba(34,197,94,0.8); }
    .answer.wrong { outline:3px solid rgba(239,68,68,0.8); }
    .row {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .notice {
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:#0c1530;
      border:1px solid var(--border);
      color:var(--muted);
    }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:16px;
      font-size:0.95rem;
    }
    th, td {
      border-bottom:1px solid var(--border);
      padding:10px 8px;
      text-align:left;
    }
    .score {
      font-size:2rem;
      font-weight:800;
      color:var(--accent2);
    }
    .small { font-size:0.9rem; color:var(--muted); }
    @media (max-width: 760px) {
      .grid2, .answers { grid-template-columns:1fr; }
      .qtext { font-size:1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section id="setup" class="card">
      <h1>Class Quiz</h1>
      <p class="muted">Each student gets shuffled questions and shuffled options. Quiz moves automatically after each answer or when time ends.</p>

      <div class="grid2">
        <div>
          <label for="studentName">Student Name</label>
          <input id="studentName" placeholder="Enter name" />
        </div>
        <div>
          <label for="regNo">Registration No</label>
          <input id="regNo" placeholder="Enter registration number" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <label for="phoneNo">Phone No</label>
          <input id="phoneNo" placeholder="Optional" />
        </div>
        <div>
          <label for="questionCount">Questions to attempt</label>
          <input id="questionCount" type="number" min="1" value="20" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <label for="securityCode">Quiz Access Code</label>
          <input id="securityCode" type="password" placeholder="Enter access code" />
        </div>
        <div>
          <label for="questionCount">Questions to attempt</label>
          <input id="questionCount" type="number" min="1" value="20" />
        </div>
      </div>

      <div class="row">
        <button id="startBtn">Start Quiz</button>
        <button id="downloadBtn" class="secondary hidden">Download Previous Result</button>
      </div>

      
    </section>

    <section id="quiz" class="card hidden">
      <div class="topbar">
        <div class="pill" id="progressPill">Question 1 / 1</div>
        <div class="pill timer" id="timerPill">15 s</div>
        <div class="pill" id="studentPill">Student</div>
      </div>
      <div class="qtext" id="questionText"></div>
      <div class="answers" id="answersBox"></div>
      <div class="row">
        <button id="nextBtn" class="secondary hidden">Next</button>
        <button id="finishBtn" class="secondary">Finish Quiz</button>
      </div>
      <div class="notice" id="quizNotice">Select one answer.</div>
    </section>

    <section id="result" class="card hidden">
      <h2>Quiz Result</h2>
      <div class="score" id="scoreText">0 / 0</div>
      <p class="muted" id="resultMeta"></p>
      <div class="row">
        <button id="downloadResultBtn" class="good">Download Result JSON</button>
        <button id="restartBtn" class="secondary">Restart</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Question</th>
            <th>Your Answer</th>
            <th>Correct Answer</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="resultTable"></tbody>
      </table>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const state = {
      student: null,
      questions: [],
      active: [],
      current: 0,
      timer: null,
      timeLeft: 0,
      score: 0,
      responses: []
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function fetchQuestions() {
      const res = await fetch('quiz.json?_=' + Date.now());
      if (!res.ok) throw new Error('Could not load quiz.json');
      const data = await res.json();
      return normalizeJson(data);
    }

    function normalizeJson(data) {
      return data.map((q, idx) => {
        const answers = q.answers || q.options;
        const correctRaw = q.correctAnswer ?? q.answer;
        if (!Array.isArray(answers) || answers.length < 2) {
          throw new Error(`Question ${idx + 1} has invalid answers/options`);
        }
        return {
          question: q.question,
          answers: answers,
          correctIndex: Number(correctRaw),
          time: Number(q.time) || 15
        };
      });
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      const headers = splitCsvLine(lines[0]).map(h => h.trim().toLowerCase());
      const rows = lines.slice(1).map(splitCsvLine);
      const idx = (name) => headers.indexOf(name);
      const required = ['question','option1','option2','option3','option4','correct'];
      for (const r of required) {
        if (idx(r) === -1) throw new Error(`Missing column in CSV: ${r}`);
      }
      return rows.map((cols, i) => {
        const answers = [cols[idx('option1')], cols[idx('option2')], cols[idx('option3')], cols[idx('option4')]];
        const correct = Number(cols[idx('correct')]) - 1;
        return {
          question: cols[idx('question')],
          answers,
          correctIndex: correct,
          time: Number(cols[idx('time')]) || 15
        };
      });
    }

    function splitCsvLine(line) {
      const out = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          out.push(cur);
          cur = '';
        } else {
          cur += ch;
        }
      }
      out.push(cur);
      return out.map(v => v.trim());
    }

    function prepareQuestions(rawQuestions) {
      const shuffledQuestions = shuffle(rawQuestions).map(q => {
        const options = q.answers.map((text, idx) => ({ text, originalIndex: idx }));
        const shuffledOptions = shuffle(options);
        const newCorrect = shuffledOptions.findIndex(o => o.originalIndex === q.correctIndex);
        return {
          question: q.question,
          answers: shuffledOptions.map(o => o.text),
          correctIndex: newCorrect,
          time: q.time
        };
      });

      const count = Math.min(Number($('questionCount').value) || shuffledQuestions.length, shuffledQuestions.length);
      return shuffledQuestions.slice(0, count);
    }

    function savePreviousResult(jsonObj) {
      localStorage.setItem('quiz_last_result', JSON.stringify(jsonObj));
      $('downloadBtn').classList.remove('hidden');
    }

    function downloadObject(obj, filename) {
      const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showSection(id) {
      ['setup','quiz','result'].forEach(sec => $(sec).classList.add('hidden'));
      $(id).classList.remove('hidden');
    }

    function paintTimer() {
      $('timerPill').textContent = `${state.timeLeft} s`;
      $('timerPill').classList.remove('low','zero');
      if (state.timeLeft <= 5 && state.timeLeft > 0) $('timerPill').classList.add('low');
      if (state.timeLeft <= 0) $('timerPill').classList.add('zero');
    }

    function startTimer() {
      clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.timeLeft -= 1;
        paintTimer();
        if (state.timeLeft <= 0) {
          clearInterval(state.timer);
          lockAndContinue(-1, true);
        }
      }, 1000);
    }

    function renderQuestion() {
      const q = state.active[state.current];
      $('progressPill').textContent = `Question ${state.current + 1} / ${state.active.length}`;
      $('studentPill').textContent = `${state.student.name} (${state.student.regNo})`;
      $('questionText').textContent = q.question;
      $('answersBox').innerHTML = '';
      $('quizNotice').textContent = 'Select one answer.';
      $('nextBtn').classList.add('hidden');

      q.answers.forEach((ans, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${ans}`;
        btn.onclick = () => lockAndContinue(idx, false);
        $('answersBox').appendChild(btn);
      });

      state.timeLeft = q.time;
      paintTimer();
      startTimer();
    }

    function lockAndContinue(selectedIndex, timedOut) {
      clearInterval(state.timer);
      const q = state.active[state.current];
      const answerButtons = [...document.querySelectorAll('.answer')];
      answerButtons.forEach(b => b.disabled = true);
      if (answerButtons[q.correctIndex]) answerButtons[q.correctIndex].classList.add('correct');
      if (selectedIndex >= 0 && selectedIndex !== q.correctIndex && answerButtons[selectedIndex]) {
        answerButtons[selectedIndex].classList.add('wrong');
      }

      const correct = selectedIndex === q.correctIndex;
      if (correct) state.score += 1;

      state.responses.push({
        questionNo: state.current + 1,
        question: q.question,
        selectedIndex,
        selectedAnswer: selectedIndex >= 0 ? q.answers[selectedIndex] : 'No answer',
        correctIndex: q.correctIndex,
        correctAnswer: q.answers[q.correctIndex],
        correct,
        timedOut
      });

      $('quizNotice').textContent = timedOut
        ? `Time up. Correct answer: ${q.answers[q.correctIndex]}`
        : correct
          ? 'Correct.'
          : `Wrong. Correct answer: ${q.answers[q.correctIndex]}`;

      setTimeout(() => {
        state.current += 1;
        if (state.current < state.active.length) {
          renderQuestion();
        } else {
          finishQuiz();
        }
      }, 900);
    }

    function finishQuiz() {
      clearInterval(state.timer);
      const resultObj = {
        student: state.student,
        totalQuestions: state.active.length,
        score: state.score,
        percentage: Number(((state.score / state.active.length) * 100).toFixed(2)),
        submittedAt: new Date().toISOString(),
        responses: state.responses
      };
      savePreviousResult(resultObj);
      $('scoreText').textContent = `${state.score} / ${state.active.length}`;
      $('resultMeta').textContent = `${state.student.name} | ${state.student.regNo} | ${state.student.phoneNo || 'No phone'} | ${resultObj.percentage}%`;
      const tbody = $('resultTable');
      tbody.innerHTML = '';
      resultObj.responses.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.questionNo}</td>
          <td>${escapeHtml(r.question)}</td>
          <td>${escapeHtml(r.selectedAnswer)}</td>
          <td>${escapeHtml(r.correctAnswer)}</td>
          <td>${r.correct ? 'Correct' : 'Wrong'}</td>
        `;
        tbody.appendChild(tr);
      });
      $('downloadResultBtn').onclick = () => {
        const safeName = `${state.student.name}_${state.student.regNo}`.replace(/[^a-zA-Z0-9_-]/g, '_');
        downloadObject(resultObj, `${safeName}_result.json`);
      };
      showSection('result');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    $('startBtn').onclick = async () => {
      const name = $('studentName').value.trim();
      const regNo = $('regNo').value.trim();
      const phoneNo = $('phoneNo').value.trim();
      const code = $('securityCode').value.trim();
      const REQUIRED_CODE = 'FM2026';
      if (!name || !regNo) {
        alert('Please enter student name and registration number.');
        return;
      }
      if (code !== REQUIRED_CODE) {
        alert('Invalid quiz access code.');
        return;
      }
      try {
        const raw = await fetchQuestions();
        state.student = { name, regNo, phoneNo };
        state.questions = raw;
        state.active = prepareQuestions(raw);
        state.current = 0;
        state.score = 0;
        state.responses = [];
        showSection('quiz');
        renderQuestion();
      } catch (err) {
        alert(err.message);
      }
    };

    $('finishBtn').onclick = finishQuiz;
    $('restartBtn').onclick = () => location.reload();
    $('downloadBtn').onclick = () => {
      const prev = localStorage.getItem('quiz_last_result');
      if (prev) downloadObject(JSON.parse(prev), 'last_quiz_result.json');
    };

    if (localStorage.getItem('quiz_last_result')) {
      $('downloadBtn').classList.remove('hidden');
    }
  </script>
</body>
</html>
