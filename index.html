<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Quiz</title>
<style>
  :root {
    --bg1:#f4f6fb;
    --bg2:#e9eef8;
    --card:#ffffff;
    --accent:#2563eb;
    --accent2:#16a34a;
    --text:#0f172a;
    --muted:#475569;
    --danger:#dc2626;
    --warn:#d97706;
    --border:rgba(0,0,0,0.08);
    --inputbg:#ffffff;
    --soft:#f8fafc;
    --soft2:#f1f5f9;
  }

  * { box-sizing: border-box; }

  body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    color:var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height:100vh;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  }

  h1,h2,h3,p { margin-top:0; }

  .muted { color: var(--muted); }

  .hidden { display:none !important; }

  .grid2 {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
  }

  label {
    display:block;
    font-size:0.95rem;
    color:var(--muted);
    margin-bottom:6px;
  }

  input {
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--inputbg);
    color:var(--text);
    font-size:1rem;
  }

  input::placeholder {
    color:#94a3b8;
  }

  button {
    padding:12px 18px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-size:1rem;
    font-weight:700;
    background:var(--accent);
    color:#ffffff;
  }

  button.secondary {
    background:#e2e8f0;
    color:var(--text);
    border:1px solid var(--border);
  }

  button.good {
    background: var(--accent2);
    color:#ffffff;
  }

  button:disabled {
    opacity:0.55;
    cursor:not-allowed;
  }

  .topbar {
    display:flex;
    gap:12px;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .pill {
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:var(--soft);
    border:1px solid var(--border);
    font-weight:700;
    color:var(--text);
  }

  .timer { font-size:1.3rem; }
  .timer.low { color: var(--warn); }
  .timer.zero { color: var(--danger); }

  .qtext {
    font-size:1.55rem;
    line-height:1.45;
    margin:18px 0 20px;
    font-weight:800;
    color:var(--text);
  }

  .answers {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .answer {
    text-align:left;
    padding:16px;
    border-radius:16px;
    border:1px solid var(--border);
    background:var(--soft);
    color:var(--text);
    min-height:84px;
  }
.answer.selected {
  border-color: var(--accent);
  background: #dbeafe;
}

.nocopy {
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}
  .answer:hover {
    border-color: rgba(37,99,235,0.55);
    background:#eff6ff;
  }

  .row {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:18px;
  }

  .notice {
    margin-top:14px;
    padding:12px 14px;
    border-radius:12px;
    background:var(--soft2);
    border:1px solid var(--border);
    color:var(--muted);
  }

  table {
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
    font-size:0.95rem;
  }

  th, td {
    border-bottom:1px solid var(--border);
    padding:10px 8px;
    text-align:left;
    color:var(--text);
  }

  .score {
    font-size:2rem;
    font-weight:800;
    color:var(--accent2);
  }

  @media (max-width: 760px) {
    .grid2, .answers { grid-template-columns:1fr; }
    .qtext { font-size:1.25rem; }
  }
</style>
</head>

<body>
  <div class="container">
    <section id="setup" class="card">
      <h1 id="quizTitle">Loading quiz...</h1>
		<p class="muted" id="quizIntro">Fetching quiz from server...</p>
		<p class="muted" id="quizDue"></p>

		<div class="notice" id="quizInstructions">
		  Marking scheme: +1 for correct, -0.25 for wrong, 0 for unattempted.
		</div>
      <div class="grid2">
        <div>
          <label for="studentName">Student Name</label>
          <input id="studentName" placeholder="Enter name"  disabled />
        </div>
        <div>
          <label for="regNo">Registration No</label>
          <input id="regNo" placeholder="Enter registration number" disabled  />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <label for="phoneNo">Phone No</label>
          <input id="phoneNo" placeholder="Optional"  disabled />
        </div>
        <div>
          <label for="studentPassword">Password</label>
          <input id="studentPassword" type="text" placeholder="Enter password" disabled  />
        </div>
      </div>

      <div class="notice">
        Marking scheme: +1 for correct, -0.25 for wrong, 0 for unattempted.
      </div>

      <div class="row">
		<button id="startBtn" disabled>Loading Quiz...</button>      </div>
    </section>

    <section id="quiz" class="card hidden">
      <div class="topbar">
        <div class="pill" id="progressPill">Question 1 / 1</div>
        <div class="pill timer" id="timerPill">15 s</div>
        <div class="pill" id="studentPill">Student</div>
      </div>
      <div class="qtext  nocopy" id="questionText"></div>
      <div class="answers" id="answersBox"></div>
		<div class="row">
		  <button id="submitAnswerBtn" disabled>Submit Answer</button>
		  <button id="finishBtn" class="secondary">Finish Quiz</button>
		</div>
      <div class="notice" id="quizNotice">Select one answer.</div>
    </section>

    <section id="result" class="card hidden">
      <h2>Quiz Result</h2>
      <div class="score" id="scoreText">0.00 / 0</div>
      <p class="muted" id="resultMeta"></p>
      <div class="row">
        <button id="restartBtn" class="secondary">Restart</button>
      </div>

    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

	const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwx_-A6OQK23IdPnpAJsHl9rf6DCWtNQzIgfBfx6aUxROcM8akpI3968gKRDUfK8w/exec";	
    const state = {
      student: null,
      questions: [],
      active: [],
      current: 0,
      timer: null,
      timeLeft: 0,
      score: 0,
      responses: [],
      isSubmitting: false,
	  selectedIndex: null
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

async function fetchQuestions() {
  const res = await fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify({ action: 'getQuestions' })
  });

  const text = await res.text();
  console.log("Raw response:", text);

  let data;
  try {
    data = JSON.parse(text);
  } catch (err) {
    throw new Error("Server did not return valid JSON: " + text);
  }

  if (data.status !== 'ok') {
    throw new Error(data.message || JSON.stringify(data));
  }

  const questions = data.questions.map((q, idx) => {
    const answers = [q.options.A, q.options.B, q.options.C, q.options.D];
    const correctMap = { A: 0, B: 1, C: 2, D: 3 };

    return {
      question: q.question,
      answers,
      correctIndex: correctMap[q.correct],
      time: Number(q.time) || 15
    };
  });

  return {
    meta: data.meta || {},
    questions
  };
}
async function loadQuizMetaOnly() {
  try {
    const fetched = await fetchQuestions();

    if (fetched.meta.quizName)
      $('quizTitle').textContent = fetched.meta.quizName;

    $('quizIntro').textContent = 'Enter your details and login password to begin.';

    if (fetched.meta.dueDate)
      $('quizDue').innerHTML = `<strong>Due Date:</strong> ${fetched.meta.dueDate}`;

    if (fetched.meta.instructions)
      $('quizInstructions').textContent = fetched.meta.instructions;

    $('studentName').disabled = false;
    $('regNo').disabled = false;
    $('phoneNo').disabled = false;
    $('studentPassword').disabled = false;

    const startBtn = $('startBtn');
    startBtn.disabled = false;
    startBtn.textContent = "Start Quiz";

  } catch (err) {
    console.error('Could not load quiz metadata:', err);
    $('quizTitle').textContent = "Quiz could not load";
    $('quizInstructions').textContent = "Please refresh the page.";
  }
}

    function prepareQuestions(rawQuestions) {
      const shuffledQuestions = shuffle(rawQuestions).map(q => {
        const options = q.answers.map((text, idx) => ({ text, originalIndex: idx }));
        const shuffledOptions = shuffle(options);
        const newCorrect = shuffledOptions.findIndex(o => o.originalIndex === q.correctIndex);

        return {
          question: q.question,
          answers: shuffledOptions.map(o => o.text),
          correctIndex: newCorrect,
          time: q.time
        };
      });

      return shuffledQuestions;
    }




    function showSection(id) {
      ['setup', 'quiz', 'result'].forEach(sec => $(sec).classList.add('hidden'));
      $(id).classList.remove('hidden');
    }

    function paintTimer() {
      $('timerPill').textContent = `${state.timeLeft} s`;
      $('timerPill').classList.remove('low', 'zero');
      if (state.timeLeft <= 5 && state.timeLeft > 0) $('timerPill').classList.add('low');
      if (state.timeLeft <= 0) $('timerPill').classList.add('zero');
    }
function recordAndContinue(selectedIndex, timedOut) {
  if (state.isSubmitting) return;

  clearInterval(state.timer);
  const q = state.active[state.current];

  const answerButtons = [...document.querySelectorAll('.answer')];
  answerButtons.forEach(b => b.disabled = true);
  $('submitAnswerBtn').disabled = true;
  $('finishBtn').disabled = true;

  const correct = selectedIndex === q.correctIndex;

  if (selectedIndex === -1) {
    // unattempted
  } else if (correct) {
    state.score += 1;
  } else {
    state.score -= 0.25;
  }

  state.responses.push({
    questionNo: state.current + 1,
    question: q.question,
    selectedIndex,
    selectedAnswer: selectedIndex >= 0 ? q.answers[selectedIndex] : 'No answer',
    correctIndex: q.correctIndex,
    correctAnswer: q.answers[q.correctIndex],
    correct,
    timedOut
  });

  $('quizNotice').textContent = timedOut ? 'Time up.' : 'Answer submitted.';

  setTimeout(() => {
    if (state.isSubmitting) return;

    state.current += 1;
    if (state.current < state.active.length) {
      renderQuestion();
    } else {
      finishQuiz();
    }
  }, 700);
}
function startTimer() {
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.timeLeft -= 1;
    paintTimer();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      recordAndContinue(-1, true);
    }
  }, 1000);
}

	function renderQuestion() {
	  const q = state.active[state.current];
	  state.selectedIndex = null;

	  $('progressPill').textContent = `Question ${state.current + 1} / ${state.active.length}`;
	  $('studentPill').textContent = `${state.student.name} (${state.student.regNo})`;
	  $('questionText').textContent = q.question;
	  $('answersBox').innerHTML = '';
	  $('quizNotice').textContent = 'Select one answer and click Submit Answer.';
	  $('finishBtn').disabled = false;
		$('submitAnswerBtn').disabled = true;

	  q.answers.forEach((ans, idx) => {
		const btn = document.createElement('button');
		btn.className = 'answer nocopy';
		btn.type = 'button';
		btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${ans}`;

		btn.onclick = () => {
		  state.selectedIndex = idx;
		  document.querySelectorAll('.answer').forEach(b => b.classList.remove('selected'));
		  btn.classList.add('selected');
		  $('submitAnswerBtn').disabled = false;
		};

		$('answersBox').appendChild(btn);
	  });

	  state.timeLeft = q.time;
	  paintTimer();
	  startTimer();
	}



async function validateStudentLogin(regNo, password) {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({
        action: 'validateLogin',
        regNo,
        password
      })
    });

    const rawText = await response.text();
    console.log('HTTP status:', response.status);
    console.log('Raw response:', rawText);

    try {
      return JSON.parse(rawText);
    } catch (e) {
      alert('Server did not return JSON. Check console.');
      return { status: 'error', raw: rawText };
    }
  } catch (err) {
    console.error('Login validation failed:', err);
    alert('Login validation failed: ' + err.message);
    return { status: 'error' };
  }
}

    async function sendResultToGoogleSheet(resultObj) {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'submitQuiz',
            ...resultObj
          })
        });

        return await response.json();
      } catch (err) {
        console.error('Failed to send result to Google Sheet:', err);
        return { status: 'error' };
      }
    }

async function finishQuiz() {
  clearInterval(state.timer);

let correct = 0;
let incorrect = 0;

state.responses.forEach(r => {
  if (r.correct) correct++;
  else incorrect++;
});

const totalQuestions = state.active.length;
const attempted = state.responses.length;
const unattempted = totalQuestions - attempted;

  const finalMarks = (correct * 1) - (incorrect * 0.25);
  const percentage = totalQuestions ? (finalMarks / totalQuestions) * 100 : 0;

  const resultObj = {
    student: state.student,
    score: finalMarks.toFixed(2),
    totalQuestions,
    percentage: percentage.toFixed(2),
    responses: state.responses
  };

  state.isSubmitting = true;

  const submitResult = await sendResultToGoogleSheet(resultObj);
  console.log("Submit result:", submitResult);

  showSection('result');

  $('scoreText').textContent = `${finalMarks.toFixed(2)} / ${totalQuestions}`;
  $('resultMeta').innerHTML = `
    <strong>Total Correct answers:</strong> ${correct}<br>
    <strong>Total Incorrect answers:</strong> ${incorrect}<br>
    <strong>Total Unattempted:</strong> ${unattempted}<br>
    <strong>Final Marks:</strong> ${finalMarks.toFixed(2)}
  `;
}



$('startBtn').onclick = async () => {
  const name = $('studentName').value.trim();
  const regNo = $('regNo').value.trim();
  const phoneNo = $('phoneNo').value.trim();
  const password = $('studentPassword').value.trim();

  if (!name || !regNo || !password) {
    alert('Please enter name, registration number, and password.');
    return;
  }

  try {
    const loginResult = await validateStudentLogin(regNo, password);
    console.log('loginResult =', loginResult);

    if (loginResult.status === 'invalid') {
      alert('Invalid registration number or password.');
      return;
    }

    if (loginResult.status === 'used') {
      alert('You have already attempted this quiz. Multiple attempts are not allowed.');
      return;
    }

    if (loginResult.status === 'ok') {
      const fetched = await fetchQuestions();
		// Load quiz metadata from sheet
	if (fetched.meta.quizName) $('quizTitle').textContent = fetched.meta.quizName;
	if (fetched.meta.dueDate) $('quizDue').innerHTML = `<strong>Due Date:</strong> ${fetched.meta.dueDate}`;
	if (fetched.meta.instructions) $('quizInstructions').textContent = fetched.meta.instructions;
      state.student = {
        name: loginResult.name || name,
        regNo,
        phoneNo
      };
      state.questions = fetched.questions;
      state.active = prepareQuestions(fetched.questions);
      state.current = 0;
      state.score = 0;
      state.responses = [];
      state.isSubmitting = false;



      showSection('quiz');
      renderQuestion();
    }

  } catch (err) {
    console.error(err);
    alert('Unable to start quiz.');
  }
};

$('submitAnswerBtn').onclick = () => {
  if (state.selectedIndex === null) {
    alert('Please select an answer first.');
    return;
  }
  recordAndContinue(state.selectedIndex, false);
};

$('finishBtn').onclick = finishQuiz;
$('restartBtn').onclick = () => location.reload();

document.addEventListener("DOMContentLoaded", loadQuizMetaOnly);  

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('cut', e => e.preventDefault());
document.addEventListener('selectstart', e => {
  if (e.target.closest('.nocopy')) e.preventDefault();
});

document.addEventListener('keydown', e => {
  const blocked =
    (e.ctrlKey || e.metaKey) &&
    ['c', 'x', 'a', 'u', 's', 'p'].includes(e.key.toLowerCase());

  if (blocked) {
    e.preventDefault();
  }
});
  </script>
</body>
</html>
